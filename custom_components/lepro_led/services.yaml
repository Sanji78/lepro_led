send_debug_command:
  name: Send debug command
  description: Send a raw MQTT command to a Lepro device for protocol investigation/debugging.
  fields:
    device_id:
      name: Device ID
      description: The Lepro device ID (DID) to target.
      required: true
      selector:
        text:
    payload:
      name: Payload
      description: >
        Dictionary placed in the "d" field of the MQTT payload sent to le/<device_id>/prp/set.
      required: true
      selector:
        object:
    entry_id:
      name: Config entry ID
      description: Optional config entry_id to disambiguate when multiple Lepro entries exist.
      required: false
      selector:
        text:

request_debug_state:
  name: Request debug state
  description: Request raw MQTT state fields from a Lepro device.
  fields:
    device_id:
      name: Device ID
      description: The Lepro device ID (DID) to target.
      required: true
      selector:
        text:
    entry_id:
      name: Config entry ID
      description: Optional config entry_id to disambiguate when multiple Lepro entries exist.
      required: false
      selector:
        text:
    keys:
      name: Keys
      description: >
        List of state keys to request (sent as '{"d": keys}' to le/<device_id>/prp/get).
      required: false
      example: >
        ["d1", "d2", "d3", "online"]
      selector:
        object:
